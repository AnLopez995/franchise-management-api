services:
  mongodb:
    image: mongo:7
    container_name: franchises-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: franchises-api
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/franchises_db
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo-data:
